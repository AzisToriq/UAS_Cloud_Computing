name: CI/CD FullstackFlavour Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Job untuk menjalankan Automated Testing (Quality Gate)
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code (Updated to v4)
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite

    - name: Copy .env
      run: cp .env.example .env

    - name: Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --prefer-dist

    - name: Install NPM & Build Frontend (Vite)
      run: |
        npm install
        npm run build

    - name: Directory Permissions (Wajib untuk Linux)
      run: chmod -R 777 storage bootstrap/cache

    - name: Generate App Key
      run: php artisan key:generate

    - name: Configure SQLite for Testing
      run: |
        touch database/database.sqlite
        sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/g' .env

    - name: Execute Automated Tests
      run: php artisan test tests/Feature

  # 2. Job untuk Build & Push Docker Image ke Docker Hub
  build-docker:
    needs: testing
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login ke Docker Hub
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Docker Image (Tag Latest & Commit SHA)
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fullstackflavour-app:latest .
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fullstackflavour-app:${{ github.sha }} .

    - name: Push Image ke Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/fullstackflavour-app:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/fullstackflavour-app:${{ github.sha }}
